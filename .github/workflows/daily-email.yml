name: Daily email rollup

on:
  schedule:
    # 13:00 UTC = 9am Eastern
    - cron: "0 13 * * *"
  workflow_dispatch: {}

jobs:
  send-daily-email:
    runs-on: ubuntu-latest
    env:
      SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
      SUPABASE_DB_PORT: ${{ secrets.SUPABASE_DB_PORT }}
      SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_DB_NAME: ${{ secrets.SUPABASE_DB_NAME }}
      SUPABASE_DB_SCHEMA: ${{ secrets.SUPABASE_DB_SCHEMA }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      DAILY_EMAIL_FROM: ${{ secrets.DAILY_EMAIL_FROM }}
      DAILY_EMAIL_TO: ${{ secrets.DAILY_EMAIL_TO }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: dbt run
        working-directory: dbt
        env:
          DBT_PROFILES_DIR: "."
        run: dbt run

      - name: Send daily email
        run: python scripts/send_daily_email.py
